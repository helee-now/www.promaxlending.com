<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promax Lending</title>
  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .page {
      width: min(92vw, 720px);
    }

    .hero {
      text-align: center;
      padding: 2rem 2.5rem;
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      border-top: 4px solid #0f766e;
      margin-bottom: 0.9rem;
    }

    .brand-logo {
      width: min(100%, 420px);
      height: auto;
      display: block;
      margin: 0 auto 1.1rem;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    p {
      margin: 0.75rem 0 0;
      font-size: 1rem;
      color: #334155;
    }

    .actions {
      margin-top: 1.2rem;
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      border-radius: 999px;
      padding: 0.65rem 1.1rem;
      font-size: 0.95rem;
      font-weight: 600;
      border: 1px solid transparent;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .btn-primary {
      color: #ffffff;
      background: #0f766e;
    }

    .btn-primary:hover {
      background: #0a5a54;
    }

    .btn-secondary {
      color: #0f766e;
      background: #e6f4f2;
      border-color: #99d6ce;
    }

    .btn-secondary:hover {
      background: #d5efea;
    }

    .features {
      margin: 1.15rem 0 0;
      padding: 0;
      list-style: none;
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .features li {
      font-size: 0.85rem;
      color: #334155;
      background: #f1f5f9;
      border-radius: 999px;
      padding: 0.35rem 0.7rem;
    }

    .contact {
      background: #ffffff;
      border-radius: 14px;
      padding: 1.1rem 1.3rem;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
      text-align: center;
    }

    .contact h2 {
      margin: 0;
      font-size: 1.15rem;
      color: #0f172a;
    }

    .contact p {
      margin-top: 0.45rem;
      font-size: 0.95rem;
    }

    .contact-links {
      margin-top: 0.8rem;
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    footer {
      margin-top: 0.8rem;
      text-align: center;
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="hero">
      <img class="brand-logo" src="assets/promax-logo.png" alt="Promax Lending" />
      <h1 class="sr-only">Promax Lending</h1>
      <p>Your trusted lending partner.</p>
      <div class="actions">
        <a class="btn btn-primary" href="#contact">Get Started</a>
        <a class="btn btn-secondary" href="tel:+10000000000">Call Us</a>
      </div>
      <ul class="features" aria-label="Key highlights">
        <li>Fast Approvals</li>
        <li>Flexible Terms</li>
        <li>Human Support</li>
      </ul>
    </main>
    <section class="contact" id="contact" aria-label="Contact Promax Lending">
      <h2>Ready to take the next step?</h2>
      <p>Connect with our loan team to discuss the right option for your goals.</p>
      <div class="contact-links">
        <a class="btn btn-primary" href="mailto:info@promaxlending.com">Email Us</a>
        <a class="btn btn-secondary" href="tel:+10000000000">Call (000) 000-0000</a>
      </div>
    </section>
    <footer>Simple lending solutions for real goals.</footer>
  </div>
</body>
</html>
